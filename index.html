<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>贪吃蛇</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09110f;
      --panel: #10201b;
      --panel-strong: #173128;
      --text: #f3fff8;
      --muted: #9fcab7;
      --accent: #62e38d;
      --accent-strong: #21b95f;
      --danger: #ff6b6b;
      --grid: rgba(173, 255, 210, 0.08);
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(98, 227, 141, 0.18), transparent 34%),
        linear-gradient(135deg, #07100e 0%, #0c1814 48%, #12281f 100%);
    }

    .game-shell {
      width: min(96vw, 760px);
      display: grid;
      gap: 18px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .scoreboard {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .score-card {
      min-width: 96px;
      padding: 12px 14px;
      border: 1px solid rgba(166, 255, 207, 0.16);
      border-radius: 8px;
      background: rgba(16, 32, 27, 0.86);
      box-shadow: 0 16px 34px var(--shadow);
    }

    .score-card span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .score-card strong {
      display: block;
      margin-top: 4px;
      font-size: 1.55rem;
      line-height: 1;
    }

    .board-wrap {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(166, 255, 207, 0.18);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 28px 72px rgba(0, 0, 0, 0.42);
    }

    canvas {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        #0c1814;
      background-size: calc(100% / 20) calc(100% / 20);
      image-rendering: pixelated;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background: rgba(7, 16, 14, 0.72);
      transition: opacity 160ms ease;
    }

    .overlay[hidden] {
      display: none;
    }

    .message {
      width: min(92%, 420px);
      padding: 26px;
      border: 1px solid rgba(166, 255, 207, 0.18);
      border-radius: 8px;
      background: rgba(16, 32, 27, 0.94);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.42);
    }

    .message h2 {
      margin: 0 0 10px;
      font-size: 1.85rem;
      line-height: 1.12;
    }

    .message p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.65;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 12px 18px;
      color: #04100a;
      background: linear-gradient(180deg, var(--accent), var(--accent-strong));
      font: 700 0.98rem/1 "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(33, 185, 95, 0.24);
    }

    button:hover {
      filter: brightness(1.06);
    }

    button:focus-visible {
      outline: 3px solid rgba(98, 227, 141, 0.38);
      outline-offset: 3px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .touch-pad {
      display: none;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(2, 48px);
      gap: 8px;
      justify-content: center;
    }

    .touch-pad button {
      width: 48px;
      height: 48px;
      padding: 0;
      color: var(--text);
      background: var(--panel-strong);
      box-shadow: none;
      border: 1px solid rgba(166, 255, 207, 0.16);
      font-size: 1.2rem;
    }

    .touch-pad .up {
      grid-column: 2;
    }

    .touch-pad .left {
      grid-column: 1;
      grid-row: 2;
    }

    .touch-pad .down {
      grid-column: 2;
      grid-row: 2;
    }

    .touch-pad .right {
      grid-column: 3;
      grid-row: 2;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
        align-items: start;
      }

      header,
      .controls {
        grid-template-columns: 1fr;
        display: grid;
      }

      .scoreboard {
        justify-content: stretch;
      }

      .score-card {
        flex: 1 1 130px;
      }

      .touch-pad {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-label="贪吃蛇游戏">
    <header>
      <div>
        <h1>贪吃蛇</h1>
        <p class="subtitle">吃掉果实，别撞墙，也别咬到自己。</p>
      </div>
      <section class="scoreboard" aria-label="计分板">
        <div class="score-card">
          <span>当前分数</span>
          <strong id="score">0</strong>
        </div>
        <div class="score-card">
          <span>最高分</span>
          <strong id="best">0</strong>
        </div>
      </section>
    </header>

    <section class="board-wrap">
      <canvas id="board" width="600" height="600" aria-label="游戏棋盘"></canvas>
      <div class="overlay" id="overlay">
        <div class="message">
          <h2 id="overlayTitle">准备开始</h2>
          <p id="overlayText">按方向键或 WASD 控制方向，按空格暂停。手机上可以使用下方方向按钮。</p>
          <button id="startBtn" type="button">开始游戏</button>
        </div>
      </div>
    </section>

    <footer class="controls">
      <span>方向键 / WASD 移动，空格暂停，Enter 重新开始。</span>
      <nav class="touch-pad" aria-label="触屏方向控制">
        <button class="up" data-dir="up" type="button" aria-label="向上">↑</button>
        <button class="left" data-dir="left" type="button" aria-label="向左">←</button>
        <button class="down" data-dir="down" type="button" aria-label="向下">↓</button>
        <button class="right" data-dir="right" type="button" aria-label="向右">→</button>
      </nav>
    </footer>
  </main>

  <script>
    const canvas = document.querySelector("#board");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.querySelector("#score");
    const bestEl = document.querySelector("#best");
    const overlay = document.querySelector("#overlay");
    const overlayTitle = document.querySelector("#overlayTitle");
    const overlayText = document.querySelector("#overlayText");
    const startBtn = document.querySelector("#startBtn");
    const touchButtons = document.querySelectorAll("[data-dir]");

    const gridSize = 20;
    const tile = canvas.width / gridSize;
    const tickMs = 112;
    const directions = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let best = Number(localStorage.getItem("snake-best") || 0);
    let timer = null;
    let running = false;
    let paused = false;

    bestEl.textContent = best;

    function resetGame() {
      snake = [
        { x: 9, y: 10 },
        { x: 8, y: 10 },
        { x: 7, y: 10 }
      ];
      direction = directions.right;
      nextDirection = directions.right;
      score = 0;
      paused = false;
      scoreEl.textContent = score;
      placeFood();
      draw();
    }

    function startGame() {
      resetGame();
      running = true;
      overlay.hidden = true;
      clearInterval(timer);
      timer = setInterval(step, tickMs);
    }

    function endGame() {
      running = false;
      clearInterval(timer);
      timer = null;
      if (score > best) {
        best = score;
        localStorage.setItem("snake-best", String(best));
        bestEl.textContent = best;
      }
      overlayTitle.textContent = "游戏结束";
      overlayText.textContent = `最终分数 ${score}。按 Enter 或点击按钮再来一局。`;
      startBtn.textContent = "重新开始";
      overlay.hidden = false;
    }

    function togglePause() {
      if (!running) return;
      paused = !paused;
      overlayTitle.textContent = paused ? "已暂停" : "继续游戏";
      overlayText.textContent = paused ? "按空格继续。" : "";
      startBtn.textContent = "继续";
      overlay.hidden = !paused;
    }

    function step() {
      if (paused) return;
      direction = nextDirection;
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (isOutOfBounds(head) || snake.some(part => part.x === head.x && part.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function isOutOfBounds(point) {
      return point.x < 0 || point.y < 0 || point.x >= gridSize || point.y >= gridSize;
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * gridSize),
          y: Math.floor(Math.random() * gridSize)
        };
      } while (snake.some(part => part.x === food.x && part.y === food.y));
    }

    function setDirection(name) {
      const candidate = directions[name];
      if (!candidate) return;
      const isReverse = candidate.x + direction.x === 0 && candidate.y + direction.y === 0;
      if (!isReverse) {
        nextDirection = candidate;
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawFood();
      drawSnake();
    }

    function drawSnake() {
      snake.forEach((part, index) => {
        const inset = index === 0 ? 3 : 5;
        const x = part.x * tile + inset;
        const y = part.y * tile + inset;
        const size = tile - inset * 2;
        ctx.fillStyle = index === 0 ? "#62e38d" : "#24b96a";
        roundRect(x, y, size, size, 7);
        ctx.fill();

        if (index === 0) {
          ctx.fillStyle = "#04100a";
          const eyeOffsetX = direction.x === 0 ? 8 : direction.x > 0 ? 15 : 6;
          const eyeOffsetY = direction.y === 0 ? 8 : direction.y > 0 ? 15 : 6;
          ctx.beginPath();
          ctx.arc(x + eyeOffsetX, y + eyeOffsetY, 3, 0, Math.PI * 2);
          ctx.arc(x + size - eyeOffsetX, y + eyeOffsetY, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function drawFood() {
      const centerX = food.x * tile + tile / 2;
      const centerY = food.y * tile + tile / 2;
      const radius = tile * 0.34;
      const gradient = ctx.createRadialGradient(centerX - 4, centerY - 5, 2, centerX, centerY, radius);
      gradient.addColorStop(0, "#fff6a8");
      gradient.addColorStop(1, "#ff6b6b");
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function roundRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + width, y, x + width, y + height, radius);
      ctx.arcTo(x + width, y + height, x, y + height, radius);
      ctx.arcTo(x, y + height, x, y, radius);
      ctx.arcTo(x, y, x + width, y, radius);
      ctx.closePath();
    }

    document.addEventListener("keydown", event => {
      const keyMap = {
        ArrowUp: "up",
        KeyW: "up",
        ArrowDown: "down",
        KeyS: "down",
        ArrowLeft: "left",
        KeyA: "left",
        ArrowRight: "right",
        KeyD: "right"
      };
      if (keyMap[event.code]) {
        event.preventDefault();
        setDirection(keyMap[event.code]);
      }
      if (event.code === "Space") {
        event.preventDefault();
        togglePause();
      }
      if (event.code === "Enter" && !running) {
        startGame();
      }
    });

    touchButtons.forEach(button => {
      button.addEventListener("click", () => setDirection(button.dataset.dir));
    });

    startBtn.addEventListener("click", () => {
      if (paused) {
        togglePause();
      } else {
        startGame();
      }
    });

    resetGame();
  </script>
</body>
</html>
